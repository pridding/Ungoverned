<!DOCTYPE html>
<html lang="en">
{% load static %}
<link rel="stylesheet" href="{% static 'css/custom.css' %}">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Stock{% endblock %}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
        <nav class="navbar navbar-expand-lg navbar-dark bg-deep-blue mb-4">
            
            <div class="container">
                <a class="navbar-brand" href="/">Ungoverned</a>

                <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#mainNavbar" aria-controls="mainNavbar" aria-expanded="false" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
        
                <div class="collapse navbar-collapse" id="mainNavbar">
                    <!-- Left side navigation -->
                    <ul class="navbar-nav me-auto">

                        <li class="nav-item">
                            <a class="nav-link{% if request.path == '/customers/' %} active{% endif %}"
                               href="{% url 'customers_list' %}">
                                Customers
                            </a>
                        </li>

                        <li class="nav-item">
                            <a class="nav-link {% if '/orders/' in request.path %}active{% endif %}"
                               href="{% url 'orders_list' %}">
                                Orders
                            </a>
                        </li>
                    
                        <li class="nav-item">
                            <a class="nav-link {% if '/components/' in request.path or '/inventory/' in request.path %}active{% endif %}"
                               href="{% url 'component_list' %}">
                                Inventory
                            </a>
                        </li>
                    
                        <li class="nav-item">
                            <a class="nav-link {% if '/build/' in request.path or '/builds/' in request.path %}active{% endif %}"
                               href="{% url 'product_bom' %}">
                                Build
                            </a>
                        </li>
                    </ul>
                    <!-- Right side auth -->
                    <ul class="navbar-nav">
                        {% if user.is_authenticated %}
                            <li class="nav-item">
                                <span class="nav-link">Hi {{ user.username }}</span>
                            </li>
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'logout' %}">Logout</a>
                            </li>
                        {% else %}
                            <li class="nav-item">
                                <a class="nav-link" href="{% url 'login' %}">Login</a>
                            </li>
                        {% endif %}
                    </ul>
                </div>
            </div>
        </nav>
    <div class="container">
        {% block content %}{% endblock %}
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
