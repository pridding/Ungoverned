<!DOCTYPE html>
<html>
<head>
    <title>Login - Ungoverned</title>
</head>
<body>
    <h1>Login</h1>

    {% if form.errors %}
        <p style="color:red;">Your username and password didn't match. Please try again.</p>
    {% endif %}

    {% if next %}
        <p>Please log in to continue.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Log in</button>
    </form>
</body>
</html>
